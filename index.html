<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hammer Girl - 2D Fighter</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #111;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        overflow: hidden;
      }

      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        image-rendering: -webkit-optimize-contrast;
        image-rendering: crisp-edges;
      }

      #rotate-warning {
        display: none;
        position: fixed;
        inset: 0;
        background: #111;
        color: #fff;
        z-index: 9999;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        font-family: sans-serif;
        text-align: center;
        gap: 20px;
      }

      #rotate-warning .icon {
        font-size: 64px;
      }

      #rotate-warning .text {
        font-size: 20px;
        color: #e74c6f;
      }

      @media (orientation: portrait) and (max-width: 768px) {
        #rotate-warning {
          display: flex;
        }
        canvas {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="rotate-warning">
      <div class="icon">📱↪️</div>
      <div class="text">Please rotate your device to landscape mode</div>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
      // ========== CONFIGURATION ==========

      const CANVAS_WIDTH = 960;
      const CANVAS_HEIGHT = 540;

      // Character rendering size on canvas (at ground level)
      const CHAR_RENDER_WIDTH = 180;
      const CHAR_RENDER_HEIGHT = 180;

      // Perspective: minimum scale when at the top of movement range
      const MIN_SCALE = 0.8;

      // Movement speed (pixels per frame)
      const MOVE_SPEED = 4;

      // Animation speed: game frames per sprite frame (lower = faster)
      const ANIM_FRAME_DURATION = 10;

      // Breathing animation config
      const BREATH_SPEED = 0.03; // how fast the breathing cycle is
      const BREATH_AMOUNT = 0.008; // max scale variation (0.8%)

      // Attack animation config
      const ATTACK_FRAME_DURATION = 8; // game frames per attack frame

      // Throw animation config
      const THROW_FRAME_DURATION = 8; // game frames per throw pose
      const HAMMER_SPEED = 8; // pixels per frame for thrown hammer
      const HAMMER_SIZE = 200; // render size of the thrown hammer
      // Rotation angles for the hammer spin cycle (in degrees)
      const HAMMER_ROTATIONS = [300, 0, 45, 90];

      // HP config
      const PLAYER_MAX_HP = 5;
      const SLIME_MAX_HP = 5;
      const HEALTHBAR_WIDTH = 300;
      const HEALTHBAR_HEIGHT = 95;
      const HEALTHBAR_MARGIN = 15;

      // Invincibility after taking damage (3 seconds at ~60fps)
      const INVINCIBLE_DURATION = 180;
      const BLINK_SPEED = 8; // blink every N frames

      // Slime enemy config
      const SLIME_WIDTH = 120;
      const SLIME_HEIGHT = 120;
      const SLIME_SPEED = 1.5;
      const SLIME_ATTACK_RANGE = 80; // distance to start attacking
      const SLIME_CHASE_RANGE = 400; // distance to start chasing
      const SLIME_ATTACK_DURATION = 20; // frames per attack
      const SLIME_HURT_DURATION = 30; // frames to show hurt pose
      const SLIME_IDLE_DURATION = 60; // frames to idle before moving again

      // Jump config
      const JUMP_VELOCITY = -18; // initial upward velocity
      const GRAVITY = 0.6; // gravity pull per frame
      const JUMP_CROUCH_FRAMES = 6; // frames to show crouch before takeoff
      const JUMP_LAND_FRAMES = 8; // frames to show landing pose

      // ========== CANVAS SETUP ==========

      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");

      canvas.width = CANVAS_WIDTH;
      canvas.height = CANVAS_HEIGHT;

      // ========== ASSET LOADER ==========

      const allImages = [];
      let assetsLoaded = 0;
      let assetsTotal = 0;
      let assetsReady = false;

      function loadImage(src) {
        const img = new Image();
        assetsTotal++;
        img.onload = () => {
          assetsLoaded++;
          if (assetsLoaded >= assetsTotal) assetsReady = true;
        };
        img.onerror = () => {
          assetsLoaded++;
          if (assetsLoaded >= assetsTotal) assetsReady = true;
        };
        img.src = src;
        allImages.push(img);
        return img;
      }

      // Background image
      const bgImage = loadImage("img/bg.png");

      // Idle (standing) frame
      const standingImg = loadImage("img/standing.png");

      // Walk frames
      const walkFrames = [];
      ["img/walk1.png", "img/walk2.png"].forEach((src) => {
        walkFrames.push(loadImage(src));
      });

      // Attack frames
      const attackFrames = [];
      [
        "img/attack/lifting-hammer.png",
        "img/attack/strong-downward-hammer-smash.png",
        "img/attack/follow-through-pose-after-the-strike.png",
      ].forEach((src) => {
        attackFrames.push(loadImage(src));
      });

      // Throw frames
      const throwFrames = [];
      [
        "img/throw/lifting-hammer.png",
        "img/throw/throw.png",
      ].forEach((src) => {
        throwFrames.push(loadImage(src));
      });

      // Hammer projectile image
      const hammerImg = loadImage("img/items/hammer-upward.png");

      // Jump frames
      const jumpFrames = [];
      [
        "img/jump/crouch-pose-preparing-to-jump.png",
        "img/jump/takeoff-pose-leaving-the-ground.png",
        "img/jump/mid-air-jump-pose.png",
        "img/jump/landing-pose-touching-the-ground.png",
      ].forEach((src) => {
        jumpFrames.push(loadImage(src));
      });

      // Slime enemy images
      const slimeImgs = {
        idle: loadImage("img/slime/idle blob pose.png"),
        move: loadImage("img/slime/stretching forward movement.png"),
        attack: loadImage("img/slime/attack pose lunging forward.png"),
        hurt: loadImage("img/slime/squished hurt pose.png"),
      };

      // Healthbar images
      const playerHealthbarImg = loadImage("img/ui/player-healthbar.png");
      const enemyHealthbarImg = loadImage("img/ui/enemy-healthbar.png");

      // ========== KEYBOARD INPUT ==========

      const keys = {};

      window.addEventListener("keydown", (e) => {
        keys[e.code] = true;
        // Prevent arrow keys and space from scrolling the page
        if (e.code.startsWith("Arrow") || e.code === "Space")
          e.preventDefault();

        // Trigger attack on E press (works in air too)
        if (
          e.code === "KeyE" &&
          !character.isAttacking &&
          !character.isThrowing
        ) {
          character.isAttacking = true;
          character.attackFrame = 0;
          character.attackTimer = 0;
        }

        // Trigger jump on Space press
        if (
          e.code === "Space" &&
          !character.isJumping &&
          !character.isAttacking &&
          !character.isThrowing
        ) {
          character.isJumping = true;
          character.jumpPhase = "crouch";
          character.jumpTimer = 0;
          character.jumpOffsetY = 0;
          character.groundY = character.y;
        }

        // Trigger throw on Q press (works in air too)
        if (
          e.code === "KeyQ" &&
          !character.isAttacking &&
          !character.isThrowing
        ) {
          character.isThrowing = true;
          character.throwFrame = 0;
          character.throwTimer = 0;
        }
      });

      window.addEventListener("keyup", (e) => {
        keys[e.code] = false;
      });

      // ========== TOUCH CONTROLS ==========

      const touch = {
        joystickId: null,  // track which touch is the joystick
        joyStartX: 0,
        joyStartY: 0,
        joyDX: 0,
        joyDY: 0,
        active: false,
      };

      const JOYSTICK_DEAD_ZONE = 15;
      const JOYSTICK_RADIUS = 60;
      const BTN_SIZE = 70;
      const BTN_MARGIN = 20;

      // Action button positions (bottom-right corner, in canvas coordinates)
      const actionBtns = {
        attack: { label: "E", cx: CANVAS_WIDTH - BTN_MARGIN - BTN_SIZE, cy: CANVAS_HEIGHT - BTN_MARGIN - BTN_SIZE },
        throw:  { label: "Q", cx: CANVAS_WIDTH - BTN_MARGIN - BTN_SIZE * 2.5, cy: CANVAS_HEIGHT - BTN_MARGIN - BTN_SIZE },
        jump:   { label: "⬆", cx: CANVAS_WIDTH - BTN_MARGIN - BTN_SIZE * 1.75, cy: CANVAS_HEIGHT - BTN_MARGIN - BTN_SIZE * 2.5 },
      };

      // Convert screen touch coords to canvas coords
      function touchToCanvas(touchX, touchY) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: (touchX - rect.left) * (CANVAS_WIDTH / rect.width),
          y: (touchY - rect.top) * (CANVAS_HEIGHT / rect.height),
        };
      }

      // Check if a point hits a button
      function hitButton(cx, cy, px, py) {
        const dx = px - cx;
        const dy = py - cy;
        return Math.sqrt(dx * dx + dy * dy) < BTN_SIZE;
      }

      canvas.addEventListener("touchstart", (e) => {
        e.preventDefault();
        for (const t of e.changedTouches) {
          const p = touchToCanvas(t.clientX, t.clientY);

          // Check action buttons first
          if (hitButton(actionBtns.attack.cx, actionBtns.attack.cy, p.x, p.y)) {
            if (!character.isAttacking && !character.isThrowing) {
              character.isAttacking = true;
              character.attackFrame = 0;
              character.attackTimer = 0;
            }
            continue;
          }
          if (hitButton(actionBtns.throw.cx, actionBtns.throw.cy, p.x, p.y)) {
            if (!character.isAttacking && !character.isThrowing) {
              character.isThrowing = true;
              character.throwFrame = 0;
              character.throwTimer = 0;
            }
            continue;
          }
          if (hitButton(actionBtns.jump.cx, actionBtns.jump.cy, p.x, p.y)) {
            if (!character.isJumping && !character.isAttacking && !character.isThrowing) {
              character.isJumping = true;
              character.jumpPhase = "crouch";
              character.jumpTimer = 0;
              character.jumpOffsetY = 0;
              character.groundY = character.y;
            }
            continue;
          }

          // Left half of screen = joystick
          if (p.x < CANVAS_WIDTH / 2 && touch.joystickId === null) {
            touch.joystickId = t.identifier;
            touch.joyStartX = p.x;
            touch.joyStartY = p.y;
            touch.joyDX = 0;
            touch.joyDY = 0;
            touch.active = true;
          }
        }
      }, { passive: false });

      canvas.addEventListener("touchmove", (e) => {
        e.preventDefault();
        for (const t of e.changedTouches) {
          if (t.identifier === touch.joystickId) {
            const p = touchToCanvas(t.clientX, t.clientY);
            touch.joyDX = p.x - touch.joyStartX;
            touch.joyDY = p.y - touch.joyStartY;
            // Clamp to radius
            const dist = Math.sqrt(touch.joyDX * touch.joyDX + touch.joyDY * touch.joyDY);
            if (dist > JOYSTICK_RADIUS) {
              touch.joyDX = (touch.joyDX / dist) * JOYSTICK_RADIUS;
              touch.joyDY = (touch.joyDY / dist) * JOYSTICK_RADIUS;
            }
          }
        }
      }, { passive: false });

      canvas.addEventListener("touchend", (e) => {
        e.preventDefault();
        for (const t of e.changedTouches) {
          if (t.identifier === touch.joystickId) {
            touch.joystickId = null;
            touch.joyDX = 0;
            touch.joyDY = 0;
            touch.active = false;
          }
        }
      }, { passive: false });

      canvas.addEventListener("touchcancel", (e) => {
        for (const t of e.changedTouches) {
          if (t.identifier === touch.joystickId) {
            touch.joystickId = null;
            touch.joyDX = 0;
            touch.joyDY = 0;
            touch.active = false;
          }
        }
      });

      // ========== CHARACTER STATE ==========

      const character = {
        x: CANVAS_WIDTH / 2 - CHAR_RENDER_WIDTH / 2, // start centered
        y: CANVAS_HEIGHT - CHAR_RENDER_HEIGHT - 20, // ground level
        currentFrame: 0, // current walk frame index
        animTimer: 0, // counts game frames for animation timing
        isMoving: false,
        facingRight: true, // character faces right by default
        breathTimer: 0, // accumulates for breathing sine wave
        isAttacking: false,
        attackFrame: 0, // current attack animation frame
        attackTimer: 0, // counts game frames for attack timing
        isThrowing: false,
        throwFrame: 0,
        throwTimer: 0,
        isJumping: false,
        jumpPhase: "", // 'crouch', 'air', 'land'
        jumpTimer: 0,
        jumpVelY: 0, // vertical velocity during jump
        jumpOffsetY: 0, // visual offset from ground (negative = up)
        groundY: 0, // remembered ground y when jump started
        hp: PLAYER_MAX_HP,
        invincible: false,
        invincibleTimer: 0,
      };

      // Active thrown hammers
      const projectiles = [];

      // Slime enemy state
      const slime = {
        x: CANVAS_WIDTH - SLIME_WIDTH - 80,
        y: CANVAS_HEIGHT - SLIME_HEIGHT - 20,
        state: "idle", // 'idle', 'chase', 'attack', 'hurt'
        stateTimer: 0,
        facingRight: false, // starts facing left (toward player)
        breathTimer: Math.random() * Math.PI * 2,
        hp: 5,
      };

      // ========== UPDATE ==========

      function update() {
        character.isMoving = false;

        // Handle movement in all directions (keyboard)
        if (keys["ArrowRight"] || keys["KeyD"]) {
          character.x += MOVE_SPEED;
          character.isMoving = true;
          character.facingRight = true;
        }
        if (keys["ArrowLeft"] || keys["KeyA"]) {
          character.x -= MOVE_SPEED;
          character.isMoving = true;
          character.facingRight = false;
        }
        if (keys["ArrowUp"] || keys["KeyW"]) {
          character.y -= MOVE_SPEED;
          character.isMoving = true;
        }
        if (keys["ArrowDown"] || keys["KeyS"]) {
          character.y += MOVE_SPEED;
          character.isMoving = true;
        }

        // Handle movement from touch joystick
        if (touch.active) {
          if (Math.abs(touch.joyDX) > JOYSTICK_DEAD_ZONE) {
            character.x += (touch.joyDX / JOYSTICK_RADIUS) * MOVE_SPEED;
            character.isMoving = true;
            character.facingRight = touch.joyDX > 0;
          }
          if (Math.abs(touch.joyDY) > JOYSTICK_DEAD_ZONE) {
            character.y += (touch.joyDY / JOYSTICK_RADIUS) * MOVE_SPEED;
            character.isMoving = true;
          }
        }

        // Clamp character within canvas bounds
        if (character.x < 0) character.x = 0;
        if (character.x > CANVAS_WIDTH - CHAR_RENDER_WIDTH) {
          character.x = CANVAS_WIDTH - CHAR_RENDER_WIDTH;
        }
        if (character.y < CANVAS_HEIGHT - CHAR_RENDER_HEIGHT - 20 - 100) {
          character.y = CANVAS_HEIGHT - CHAR_RENDER_HEIGHT - 20 - 100;
        }
        if (character.y > CANVAS_HEIGHT - CHAR_RENDER_HEIGHT - 20) {
          character.y = CANVAS_HEIGHT - CHAR_RENDER_HEIGHT - 20;
        }

        // Jump logic
        if (character.isJumping) {
          character.jumpTimer++;

          if (character.jumpPhase === "crouch") {
            // Show crouch for a few frames then launch
            if (character.jumpTimer >= JUMP_CROUCH_FRAMES) {
              character.jumpPhase = "air";
              character.jumpVelY = JUMP_VELOCITY;
              character.jumpTimer = 0;
            }
          } else if (character.jumpPhase === "air") {
            // Apply gravity
            character.jumpOffsetY += character.jumpVelY;
            character.jumpVelY += GRAVITY;

            // Landed when offset returns to 0 or above
            if (character.jumpOffsetY >= 0) {
              character.jumpOffsetY = 0;
              character.jumpPhase = "land";
              character.jumpTimer = 0;
            }
          } else if (character.jumpPhase === "land") {
            // Show landing pose for a few frames
            if (character.jumpTimer >= JUMP_LAND_FRAMES) {
              character.isJumping = false;
              character.jumpPhase = "";
              character.jumpOffsetY = 0;
            }
          }
        }

        // Throw animation takes priority over attack
        if (character.isThrowing) {
          character.throwTimer++;
          if (character.throwTimer >= THROW_FRAME_DURATION) {
            character.throwTimer = 0;
            character.throwFrame++;
            // Spawn hammer projectile when reaching the throw pose (last frame)
            if (character.throwFrame === throwFrames.length - 1) {
              const dir = character.facingRight ? 1 : -1;
              projectiles.push({
                x:
                  character.x + (character.facingRight ? CHAR_RENDER_WIDTH : 0),
                y:
                  character.y +
                  character.jumpOffsetY +
                  CHAR_RENDER_HEIGHT * 0.3,
                dir: dir,
                rotIndex: 0,
                rotTimer: 0,
              });
            }
            if (character.throwFrame >= throwFrames.length) {
              character.isThrowing = false;
              character.throwFrame = 0;
            }
          }
        } else if (character.isAttacking) {
          // Attack animation
          character.attackTimer++;
          if (character.attackTimer >= ATTACK_FRAME_DURATION) {
            character.attackTimer = 0;
            character.attackFrame++;
            // End attack when all frames have played
            if (character.attackFrame >= attackFrames.length) {
              character.isAttacking = false;
              character.attackFrame = 0;
            }
          }
        } else if (character.isMoving) {
          // Animate walk cycle when moving
          character.animTimer++;
          if (character.animTimer >= ANIM_FRAME_DURATION) {
            character.animTimer = 0;
            character.currentFrame =
              (character.currentFrame + 1) % walkFrames.length;
          }
        } else {
          // Idle: show first frame, reset timer
          character.currentFrame = 0;
          character.animTimer = 0;
        }

        // Breathing timer always ticks
        character.breathTimer += BREATH_SPEED;

        // Invincibility countdown
        if (character.invincible) {
          character.invincibleTimer--;
          if (character.invincibleTimer <= 0) {
            character.invincible = false;
          }
        }

        // ===== SLIME AI =====
        if (slime.hp > 0) {
          slime.stateTimer++;
          slime.breathTimer += BREATH_SPEED;

          // Distance from slime center to character center
          const dx =
            character.x + CHAR_RENDER_WIDTH / 2 - (slime.x + SLIME_WIDTH / 2);
          const dy =
            character.y +
            character.jumpOffsetY +
            CHAR_RENDER_HEIGHT / 2 -
            (slime.y + SLIME_HEIGHT / 2);
          const dist = Math.sqrt(dx * dx + dy * dy);

          // Face toward the player
          slime.facingRight = dx > 0;

          if (slime.state === "hurt") {
            if (slime.stateTimer >= SLIME_HURT_DURATION) {
              slime.state = "idle";
              slime.stateTimer = 0;
            }
          } else if (slime.state === "attack") {
            if (slime.stateTimer >= SLIME_ATTACK_DURATION) {
              slime.state = "idle";
              slime.stateTimer = 0;
            }
          } else if (slime.state === "idle") {
            if (dist < SLIME_ATTACK_RANGE) {
              slime.state = "attack";
              slime.stateTimer = 0;
            } else if (dist < SLIME_CHASE_RANGE) {
              slime.state = "chase";
              slime.stateTimer = 0;
            } else if (slime.stateTimer >= SLIME_IDLE_DURATION) {
              slime.state = "chase";
              slime.stateTimer = 0;
            }
          } else if (slime.state === "chase") {
            // Move toward the player
            if (dist > SLIME_ATTACK_RANGE) {
              const angle = Math.atan2(dy, dx);
              slime.x += Math.cos(angle) * SLIME_SPEED;
              slime.y += Math.sin(angle) * SLIME_SPEED;

              // Clamp slime within bounds
              if (slime.x < 0) slime.x = 0;
              if (slime.x > CANVAS_WIDTH - SLIME_WIDTH)
                slime.x = CANVAS_WIDTH - SLIME_WIDTH;
              if (slime.y < CANVAS_HEIGHT - SLIME_HEIGHT - 20 - 100) {
                slime.y = CANVAS_HEIGHT - SLIME_HEIGHT - 20 - 100;
              }
              if (slime.y > CANVAS_HEIGHT - SLIME_HEIGHT - 20) {
                slime.y = CANVAS_HEIGHT - SLIME_HEIGHT - 20;
              }
            } else {
              slime.state = "attack";
              slime.stateTimer = 0;
            }
          }

          // Slime damages player on attack (once per attack at frame 10)
          if (
            slime.state === "attack" &&
            slime.stateTimer === 10 &&
            dist < SLIME_ATTACK_RANGE + 30 &&
            !character.invincible
          ) {
            character.hp--;
            if (character.hp < 0) character.hp = 0;
            character.invincible = true;
            character.invincibleTimer = INVINCIBLE_DURATION;
          }

          // Check if player's attack hits slime
          if (character.isAttacking && character.attackFrame === 1) {
            const attackX = character.facingRight
              ? character.x + CHAR_RENDER_WIDTH
              : character.x - 40;
            const attackY =
              character.y + character.jumpOffsetY + CHAR_RENDER_HEIGHT * 0.3;
            const hitDx = attackX - (slime.x + SLIME_WIDTH / 2);
            const hitDy = attackY - (slime.y + SLIME_HEIGHT / 2);
            if (Math.sqrt(hitDx * hitDx + hitDy * hitDy) < SLIME_WIDTH) {
              if (slime.state !== "hurt") {
                slime.state = "hurt";
                slime.stateTimer = 0;
                slime.hp--;
                // Knockback
                slime.x += character.facingRight ? 30 : -30;
              }
            }
          }

          // Check if projectile hits slime
          for (let i = projectiles.length - 1; i >= 0; i--) {
            const p = projectiles[i];
            const hitDx = p.x - (slime.x + SLIME_WIDTH / 2);
            const hitDy = p.y - (slime.y + SLIME_HEIGHT / 2);
            if (Math.sqrt(hitDx * hitDx + hitDy * hitDy) < SLIME_WIDTH * 0.7) {
              slime.state = "hurt";
              slime.stateTimer = 0;
              slime.hp--;
              slime.x += p.dir * 40;
              projectiles.splice(i, 1);
            }
          }
        }

        // Update projectiles
        for (let i = projectiles.length - 1; i >= 0; i--) {
          const p = projectiles[i];
          p.x += HAMMER_SPEED * p.dir;

          // Step through rotation angles once, then stay on last
          p.rotTimer++;
          if (p.rotTimer >= 4 && p.rotIndex < HAMMER_ROTATIONS.length - 1) {
            p.rotTimer = 0;
            p.rotIndex++;
          }

          // Remove if off screen
          if (p.x < -HAMMER_SIZE || p.x > CANVAS_WIDTH + HAMMER_SIZE) {
            projectiles.splice(i, 1);
          }
        }
      }

      // ========== RENDER ==========

      function render() {
        // Clear canvas
        ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

        // Draw background (stretch to fill canvas)
        if (bgImage.complete && bgImage.naturalWidth > 0) {
          ctx.drawImage(bgImage, 0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
        } else {
          // Fallback gradient
          const grad = ctx.createLinearGradient(0, 0, 0, CANVAS_HEIGHT);
          grad.addColorStop(0, "#4a90d9");
          grad.addColorStop(0.6, "#87CEEB");
          grad.addColorStop(0.6, "#555");
          grad.addColorStop(1, "#333");
          ctx.fillStyle = grad;
          ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
        }

        // Calculate perspective scale based on y position
        const groundY = CANVAS_HEIGHT - CHAR_RENDER_HEIGHT - 20;
        const topY = groundY - 100;
        // scale goes from 1.0 (at ground) to MIN_SCALE (at top)
        const t = (groundY - character.y) / (groundY - topY); // 0 at ground, 1 at top
        const scale = 1 - t * (1 - MIN_SCALE);

        // Apply breathing effect (subtle sine wave scale)
        const breathScale = 1 + Math.sin(character.breathTimer) * BREATH_AMOUNT;

        const drawW = Math.round(CHAR_RENDER_WIDTH * scale * breathScale);
        const drawH = Math.round(CHAR_RENDER_HEIGHT * scale * breathScale);
        // Keep feet anchored: adjust y so bottom edge stays consistent
        const drawX = Math.round(character.x + (CHAR_RENDER_WIDTH - drawW) / 2);
        const drawY = Math.round(
          character.y + (CHAR_RENDER_HEIGHT - drawH) + character.jumpOffsetY,
        );

        // Pick the right frame: attack > throw > jump > walk > idle
        // Attack works even while jumping
        let frame;
        if (character.isAttacking) {
          frame = attackFrames[character.attackFrame];
        } else if (character.isThrowing) {
          frame = throwFrames[character.throwFrame];
        } else if (character.isJumping) {
          if (character.jumpPhase === "crouch") frame = jumpFrames[0];
          else if (character.jumpPhase === "air" && character.jumpVelY < 0)
            frame = jumpFrames[1];
          else if (character.jumpPhase === "air") frame = jumpFrames[2];
          else frame = jumpFrames[3];
        } else if (character.isMoving) {
          frame = walkFrames[character.currentFrame];
        } else {
          frame = standingImg;
        }

        // Skip drawing every few frames when invincible (blinking effect)
        const visible =
          !character.invincible ||
          Math.floor(character.invincibleTimer / BLINK_SPEED) % 2 === 0;

        if (visible) {
          if (frame && frame.complete && frame.naturalWidth > 0) {
            ctx.save();

            if (!character.facingRight) {
              ctx.translate(drawX + drawW, drawY);
              ctx.scale(-1, 1);
              ctx.drawImage(frame, 0, 0, drawW, drawH);
            } else {
              ctx.drawImage(frame, drawX, drawY, drawW, drawH);
            }

            ctx.restore();
          } else {
            ctx.fillStyle = "#ff69b4";
            ctx.fillRect(drawX, drawY, drawW, drawH);
          }
        }

        // Draw slime enemy
        if (slime.hp > 0) {
          let slimeFrame;
          if (slime.state === "hurt") slimeFrame = slimeImgs.hurt;
          else if (slime.state === "attack") slimeFrame = slimeImgs.attack;
          else if (slime.state === "chase") slimeFrame = slimeImgs.move;
          else slimeFrame = slimeImgs.idle;

          // Perspective scale for slime
          const slimeGroundY = CANVAS_HEIGHT - SLIME_HEIGHT - 20;
          const slimeTopY = slimeGroundY - 100;
          const slimeT = Math.max(
            0,
            Math.min(1, (slimeGroundY - slime.y) / (slimeGroundY - slimeTopY)),
          );
          const slimeScale = 1 - slimeT * (1 - MIN_SCALE);

          // Breathing for slime
          const slimeBreath = 1 + Math.sin(slime.breathTimer) * BREATH_AMOUNT;

          const sW = Math.round(SLIME_WIDTH * slimeScale * slimeBreath);
          const sH = Math.round(SLIME_HEIGHT * slimeScale * slimeBreath);
          const sX = Math.round(slime.x + (SLIME_WIDTH - sW) / 2);
          const sY = Math.round(slime.y + (SLIME_HEIGHT - sH));

          if (
            slimeFrame &&
            slimeFrame.complete &&
            slimeFrame.naturalWidth > 0
          ) {
            ctx.save();
            if (slime.facingRight) {
              ctx.translate(sX + sW, sY);
              ctx.scale(-1, 1);
              ctx.drawImage(slimeFrame, 0, 0, sW, sH);
            } else {
              ctx.drawImage(slimeFrame, sX, sY, sW, sH);
            }
            ctx.restore();
          }
        }

        // Draw healthbars (UI layer)
        // Player healthbar - top left
        if (playerHealthbarImg.complete && playerHealthbarImg.naturalWidth > 0) {
          // Draw the healthbar background image
          ctx.drawImage(
            playerHealthbarImg,
            HEALTHBAR_MARGIN,
            HEALTHBAR_MARGIN,
            HEALTHBAR_WIDTH,
            HEALTHBAR_HEIGHT,
          );

          // Draw dark overlay to represent lost HP (clip from right)
          const playerHpRatio = character.hp / PLAYER_MAX_HP;
          if (playerHpRatio < 1) {
            // The bar area starts ~28% from left (after the heart icon) and ends ~95% width
            const barLeft = HEALTHBAR_MARGIN + HEALTHBAR_WIDTH * 0.28;
            const barRight = HEALTHBAR_MARGIN + HEALTHBAR_WIDTH * 0.95;
            const barTop = HEALTHBAR_MARGIN + HEALTHBAR_HEIGHT * 0.2;
            const barBottom = HEALTHBAR_MARGIN + HEALTHBAR_HEIGHT * 0.7;
            const barW = barRight - barLeft;
            const lostW = barW * (1 - playerHpRatio);
            ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
            ctx.fillRect(barRight - lostW, barTop, lostW, barBottom - barTop);
          }
        }

        // Enemy healthbar - top right (flipped)
        if (enemyHealthbarImg.complete && enemyHealthbarImg.naturalWidth > 0) {
          ctx.save();
          // Flip horizontally and position at top right
          const ebX = CANVAS_WIDTH - HEALTHBAR_MARGIN;
          const enemyBarTop = HEALTHBAR_MARGIN - 20;
          ctx.translate(ebX, enemyBarTop);
          ctx.scale(-1, 1);
          ctx.drawImage(enemyHealthbarImg, 0, 0, HEALTHBAR_WIDTH, HEALTHBAR_HEIGHT);
          ctx.restore();

          // Draw dark overlay for lost enemy HP
          const slimeHpRatio = slime.hp / SLIME_MAX_HP;
          if (slimeHpRatio < 1) {
            const ebRight = CANVAS_WIDTH - HEALTHBAR_MARGIN;
            const barLeft = ebRight - HEALTHBAR_WIDTH * 0.95;
            const barRight = ebRight - HEALTHBAR_WIDTH * 0.28;
            const barTop = enemyBarTop + HEALTHBAR_HEIGHT * 0.25;
            const barBottom = enemyBarTop + HEALTHBAR_HEIGHT * 0.75;
            const barW = barRight - barLeft;
            const lostW = barW * (1 - slimeHpRatio);
            ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
            ctx.fillRect(barLeft, barTop, lostW, barBottom - barTop);
          }
        }

        // Draw projectiles (thrown hammers)
        if (hammerImg.complete && hammerImg.naturalWidth > 0) {
          for (const p of projectiles) {
            ctx.save();
            const angle = (HAMMER_ROTATIONS[p.rotIndex] * Math.PI) / 180;
            ctx.translate(p.x, p.y);
            if (p.dir < 0) ctx.scale(-1, 1);
            ctx.rotate(angle);
            ctx.drawImage(
              hammerImg,
              -HAMMER_SIZE / 2,
              -HAMMER_SIZE / 2,
              HAMMER_SIZE,
              HAMMER_SIZE,
            );
            ctx.restore();
          }
        }

        // Draw touch controls (only if touch device)
        if ("ontouchstart" in window) {
          ctx.globalAlpha = 0.35;

          // Joystick base
          if (touch.active) {
            // Base circle
            ctx.beginPath();
            ctx.arc(touch.joyStartX, touch.joyStartY, JOYSTICK_RADIUS, 0, Math.PI * 2);
            ctx.fillStyle = "#fff";
            ctx.fill();

            // Thumb circle
            ctx.beginPath();
            ctx.arc(touch.joyStartX + touch.joyDX, touch.joyStartY + touch.joyDY, 25, 0, Math.PI * 2);
            ctx.fillStyle = "#ccc";
            ctx.fill();
          }

          // Action buttons
          ctx.font = "bold 24px sans-serif";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";

          for (const [, btn] of Object.entries(actionBtns)) {
            ctx.beginPath();
            ctx.arc(btn.cx, btn.cy, BTN_SIZE * 0.5, 0, Math.PI * 2);
            ctx.fillStyle = "#fff";
            ctx.fill();
            ctx.fillStyle = "#000";
            ctx.globalAlpha = 0.6;
            ctx.fillText(btn.label, btn.cx, btn.cy);
            ctx.globalAlpha = 0.35;
          }

          ctx.globalAlpha = 1;
        }
      }

      // ========== LOADING SCREEN ==========

      let loadingDots = 0;
      let loadingTimer = 0;
      let gameStarted = false;

      function renderLoading() {
        ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

        // Dark background
        ctx.fillStyle = "#111";
        ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

        // Title
        ctx.fillStyle = "#fff";
        ctx.font = "bold 36px sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("HAMMER GIRL", CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 - 60);

        // Progress bar background
        const barW = 300;
        const barH = 20;
        const barX = (CANVAS_WIDTH - barW) / 2;
        const barY = CANVAS_HEIGHT / 2;
        ctx.fillStyle = "#333";
        ctx.fillRect(barX, barY, barW, barH);

        // Progress bar fill
        const progress = assetsTotal > 0 ? assetsLoaded / assetsTotal : 0;
        ctx.fillStyle = "#e74c6f";
        ctx.fillRect(barX, barY, barW * progress, barH);

        // Progress bar border
        ctx.strokeStyle = "#555";
        ctx.lineWidth = 2;
        ctx.strokeRect(barX, barY, barW, barH);

        // Loading text with animated dots
        loadingTimer++;
        if (loadingTimer % 20 === 0) loadingDots = (loadingDots + 1) % 4;
        ctx.fillStyle = "#aaa";
        ctx.font = "18px sans-serif";
        ctx.fillText(
          "Loading" + ".".repeat(loadingDots) + " " + Math.round(progress * 100) + "%",
          CANVAS_WIDTH / 2,
          CANVAS_HEIGHT / 2 + 50,
        );
      }

      // ========== GAME LOOP ==========

      function renderStartScreen() {
        ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
        ctx.fillStyle = "#111";
        ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

        ctx.fillStyle = "#fff";
        ctx.font = "bold 48px sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("HAMMER GIRL", CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 - 40);

        // Blinking "tap to start" text
        if (Math.floor(Date.now() / 500) % 2 === 0) {
          ctx.fillStyle = "#e74c6f";
          ctx.font = "22px sans-serif";
          ctx.fillText("Tap or Click to Start", CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 + 30);
        }
      }

      function startGame() {
        if (!assetsReady || gameStarted) return;
        gameStarted = true;

        // Try to go fullscreen
        const el = document.documentElement;
        const rfs = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
        if (rfs) {
          rfs.call(el).catch(() => {});
        }
      }

      canvas.addEventListener("click", startGame);
      canvas.addEventListener("touchend", (e) => {
        if (!gameStarted && assetsReady) {
          e.preventDefault();
          startGame();
        }
      }, { passive: false });

      function gameLoop() {
        if (!assetsReady) {
          renderLoading();
        } else if (!gameStarted) {
          renderStartScreen();
        } else {
          update();
          render();
        }
        requestAnimationFrame(gameLoop);
      }

      // Start the loop
      requestAnimationFrame(gameLoop);
    </script>
  </body>
</html>
