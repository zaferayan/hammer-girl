<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hammer Girl - 2D Fighter</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    canvas {
      display: block;
      max-width: 100vw;
      max-height: 100vh;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <script>
    // ========== CONFIGURATION ==========

    const CANVAS_WIDTH = 960;
    const CANVAS_HEIGHT = 540;

    // Character rendering size on canvas (at ground level)
    const CHAR_RENDER_WIDTH = 180;
    const CHAR_RENDER_HEIGHT = 180;

    // Perspective: minimum scale when at the top of movement range
    const MIN_SCALE = 0.8;

    // Movement speed (pixels per frame)
    const MOVE_SPEED = 4;

    // Animation speed: game frames per sprite frame (lower = faster)
    const ANIM_FRAME_DURATION = 10;

    // ========== CANVAS SETUP ==========

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    canvas.width = CANVAS_WIDTH;
    canvas.height = CANVAS_HEIGHT;

    // ========== LOAD ASSETS ==========

    // Background image
    const bgImage = new Image();
    bgImage.src = 'img/bg.png';

    // Idle (standing) frame
    const standingImg = new Image();
    standingImg.src = 'img/standing.png';

    // Walk frames as separate images
    const walkFrames = [];
    const walkSources = ['img/walk1.png', 'img/walk2.png'];

    walkSources.forEach((src) => {
      const img = new Image();
      img.src = src;
      walkFrames.push(img);
    });

    // ========== KEYBOARD INPUT ==========

    const keys = {};

    window.addEventListener('keydown', (e) => {
      keys[e.code] = true;
      // Prevent arrow keys from scrolling the page
      if (e.code.startsWith('Arrow')) e.preventDefault();
    });

    window.addEventListener('keyup', (e) => {
      keys[e.code] = false;
    });

    // ========== CHARACTER STATE ==========

    const character = {
      x: CANVAS_WIDTH / 2 - CHAR_RENDER_WIDTH / 2,  // start centered
      y: CANVAS_HEIGHT - CHAR_RENDER_HEIGHT - 20,    // ground level
      currentFrame: 0,   // current walk frame index
      animTimer: 0,      // counts game frames for animation timing
      isMoving: false,
      facingRight: true,  // character faces right by default
    };

    // ========== UPDATE ==========

    function update() {
      character.isMoving = false;

      // Handle movement in all directions
      if (keys['ArrowRight']) {
        character.x += MOVE_SPEED;
        character.isMoving = true;
        character.facingRight = true;
      }
      if (keys['ArrowLeft']) {
        character.x -= MOVE_SPEED;
        character.isMoving = true;
        character.facingRight = false;
      }
      if (keys['ArrowUp']) {
        character.y -= MOVE_SPEED;
        character.isMoving = true;
      }
      if (keys['ArrowDown']) {
        character.y += MOVE_SPEED;
        character.isMoving = true;
      }

      // Clamp character within canvas bounds
      if (character.x < 0) character.x = 0;
      if (character.x > CANVAS_WIDTH - CHAR_RENDER_WIDTH) {
        character.x = CANVAS_WIDTH - CHAR_RENDER_WIDTH;
      }
      if (character.y < CANVAS_HEIGHT - CHAR_RENDER_HEIGHT - 20 - 100) {
        character.y = CANVAS_HEIGHT - CHAR_RENDER_HEIGHT - 20 - 100;
      }
      if (character.y > CANVAS_HEIGHT - CHAR_RENDER_HEIGHT - 20) {
        character.y = CANVAS_HEIGHT - CHAR_RENDER_HEIGHT - 20;
      }

      // Animate walk cycle when moving, reset to idle when stopped
      if (character.isMoving) {
        character.animTimer++;
        if (character.animTimer >= ANIM_FRAME_DURATION) {
          character.animTimer = 0;
          character.currentFrame = (character.currentFrame + 1) % walkFrames.length;
        }
      } else {
        // Idle: show first frame, reset timer
        character.currentFrame = 0;
        character.animTimer = 0;
      }
    }

    // ========== RENDER ==========

    function render() {
      // Clear canvas
      ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

      // Draw background (stretch to fill canvas)
      if (bgImage.complete && bgImage.naturalWidth > 0) {
        ctx.drawImage(bgImage, 0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
      } else {
        // Fallback gradient
        const grad = ctx.createLinearGradient(0, 0, 0, CANVAS_HEIGHT);
        grad.addColorStop(0, '#4a90d9');
        grad.addColorStop(0.6, '#87CEEB');
        grad.addColorStop(0.6, '#555');
        grad.addColorStop(1, '#333');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
      }

      // Calculate perspective scale based on y position
      const groundY = CANVAS_HEIGHT - CHAR_RENDER_HEIGHT - 20;
      const topY = groundY - 100;
      // scale goes from 1.0 (at ground) to MIN_SCALE (at top)
      const t = (groundY - character.y) / (groundY - topY); // 0 at ground, 1 at top
      const scale = 1 - t * (1 - MIN_SCALE);

      const drawW = CHAR_RENDER_WIDTH * scale;
      const drawH = CHAR_RENDER_HEIGHT * scale;
      // Keep feet anchored: adjust y so bottom edge stays consistent
      const drawX = character.x + (CHAR_RENDER_WIDTH - drawW) / 2;
      const drawY = character.y + (CHAR_RENDER_HEIGHT - drawH);

      // Draw character: use standing image when idle, walk frames when moving
      const frame = character.isMoving ? walkFrames[character.currentFrame] : standingImg;

      if (frame && frame.complete && frame.naturalWidth > 0) {
        ctx.save();

        if (!character.facingRight) {
          ctx.translate(drawX + drawW, drawY);
          ctx.scale(-1, 1);
          ctx.drawImage(frame, 0, 0, drawW, drawH);
        } else {
          ctx.drawImage(frame, drawX, drawY, drawW, drawH);
        }

        ctx.restore();
      } else {
        ctx.fillStyle = '#ff69b4';
        ctx.fillRect(drawX, drawY, drawW, drawH);
      }
    }

    // ========== GAME LOOP ==========

    function gameLoop() {
      update();
      render();
      requestAnimationFrame(gameLoop);
    }

    // Start the game loop
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
