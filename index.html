<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hammer Girl - 2D Fighter</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    canvas {
      display: block;
      max-width: 100vw;
      max-height: 100vh;
      image-rendering: -webkit-optimize-contrast;
      image-rendering: crisp-edges;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <script>
    // ========== CONFIGURATION ==========

    const CANVAS_WIDTH = 960;
    const CANVAS_HEIGHT = 540;

    // Character rendering size on canvas (at ground level)
    const CHAR_RENDER_WIDTH = 180;
    const CHAR_RENDER_HEIGHT = 180;

    // Perspective: minimum scale when at the top of movement range
    const MIN_SCALE = 0.8;

    // Movement speed (pixels per frame)
    const MOVE_SPEED = 4;

    // Animation speed: game frames per sprite frame (lower = faster)
    const ANIM_FRAME_DURATION = 10;

    // Breathing animation config
    const BREATH_SPEED = 0.03;    // how fast the breathing cycle is
    const BREATH_AMOUNT = 0.008;  // max scale variation (0.8%)

    // Attack animation config
    const ATTACK_FRAME_DURATION = 8; // game frames per attack frame

    // Throw animation config
    const THROW_FRAME_DURATION = 8;  // game frames per throw pose
    const HAMMER_SPEED = 8;          // pixels per frame for thrown hammer
    const HAMMER_SIZE = 60;          // render size of the thrown hammer
    // Rotation angles for the hammer spin cycle (in degrees)
    const HAMMER_ROTATIONS = [300, 0, 45, 90];

    // ========== CANVAS SETUP ==========

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    canvas.width = CANVAS_WIDTH;
    canvas.height = CANVAS_HEIGHT;

    // ========== LOAD ASSETS ==========

    // Background image
    const bgImage = new Image();
    bgImage.src = 'img/bg.png';

    // Idle (standing) frame
    const standingImg = new Image();
    standingImg.src = 'img/standing.png';

    // Walk frames as separate images
    const walkFrames = [];
    const walkSources = ['img/walk1.png', 'img/walk2.png'];

    walkSources.forEach((src) => {
      const img = new Image();
      img.src = src;
      walkFrames.push(img);
    });

    // Attack frames (in animation order)
    const attackFrames = [];
    const attackSources = [
      'img/attack/lifting-hammer.png',
      'img/attack/strong-downward-hammer-smash.png',
      'img/attack/follow-through-pose-after-the-strike.png',
    ];

    attackSources.forEach((src) => {
      const img = new Image();
      img.src = src;
      attackFrames.push(img);
    });

    // Throw frames (in animation order: lift then throw)
    const throwFrames = [];
    const throwSources = [
      'img/throw/lifting-hammer.png',
      'img/throw/throw.png',
    ];

    throwSources.forEach((src) => {
      const img = new Image();
      img.src = src;
      throwFrames.push(img);
    });

    // Hammer projectile image
    const hammerImg = new Image();
    hammerImg.src = 'img/items/hammer-upward.png';

    // ========== KEYBOARD INPUT ==========

    const keys = {};

    window.addEventListener('keydown', (e) => {
      keys[e.code] = true;
      // Prevent arrow keys and space from scrolling the page
      if (e.code.startsWith('Arrow') || e.code === 'Space') e.preventDefault();

      // Trigger attack on Space press (only if not already attacking/throwing)
      if (e.code === 'Space' && !character.isAttacking && !character.isThrowing) {
        character.isAttacking = true;
        character.attackFrame = 0;
        character.attackTimer = 0;
      }

      // Trigger throw on E press (only if not already attacking/throwing)
      if (e.code === 'KeyE' && !character.isAttacking && !character.isThrowing) {
        character.isThrowing = true;
        character.throwFrame = 0;
        character.throwTimer = 0;
      }
    });

    window.addEventListener('keyup', (e) => {
      keys[e.code] = false;
    });

    // ========== CHARACTER STATE ==========

    const character = {
      x: CANVAS_WIDTH / 2 - CHAR_RENDER_WIDTH / 2,  // start centered
      y: CANVAS_HEIGHT - CHAR_RENDER_HEIGHT - 20,    // ground level
      currentFrame: 0,   // current walk frame index
      animTimer: 0,      // counts game frames for animation timing
      isMoving: false,
      facingRight: true,  // character faces right by default
      breathTimer: 0,     // accumulates for breathing sine wave
      isAttacking: false,
      attackFrame: 0,     // current attack animation frame
      attackTimer: 0,     // counts game frames for attack timing
      isThrowing: false,
      throwFrame: 0,
      throwTimer: 0,
    };

    // Active thrown hammers
    const projectiles = [];

    // ========== UPDATE ==========

    function update() {
      character.isMoving = false;

      // Handle movement in all directions
      if (keys['ArrowRight']) {
        character.x += MOVE_SPEED;
        character.isMoving = true;
        character.facingRight = true;
      }
      if (keys['ArrowLeft']) {
        character.x -= MOVE_SPEED;
        character.isMoving = true;
        character.facingRight = false;
      }
      if (keys['ArrowUp']) {
        character.y -= MOVE_SPEED;
        character.isMoving = true;
      }
      if (keys['ArrowDown']) {
        character.y += MOVE_SPEED;
        character.isMoving = true;
      }

      // Clamp character within canvas bounds
      if (character.x < 0) character.x = 0;
      if (character.x > CANVAS_WIDTH - CHAR_RENDER_WIDTH) {
        character.x = CANVAS_WIDTH - CHAR_RENDER_WIDTH;
      }
      if (character.y < CANVAS_HEIGHT - CHAR_RENDER_HEIGHT - 20 - 100) {
        character.y = CANVAS_HEIGHT - CHAR_RENDER_HEIGHT - 20 - 100;
      }
      if (character.y > CANVAS_HEIGHT - CHAR_RENDER_HEIGHT - 20) {
        character.y = CANVAS_HEIGHT - CHAR_RENDER_HEIGHT - 20;
      }

      // Throw animation takes priority over attack
      if (character.isThrowing) {
        character.throwTimer++;
        if (character.throwTimer >= THROW_FRAME_DURATION) {
          character.throwTimer = 0;
          character.throwFrame++;
          // Spawn hammer projectile when reaching the throw pose (last frame)
          if (character.throwFrame === throwFrames.length - 1) {
            const dir = character.facingRight ? 1 : -1;
            projectiles.push({
              x: character.x + (character.facingRight ? CHAR_RENDER_WIDTH : 0),
              y: character.y + CHAR_RENDER_HEIGHT * 0.3,
              dir: dir,
              rotIndex: 0,
              rotTimer: 0,
            });
          }
          if (character.throwFrame >= throwFrames.length) {
            character.isThrowing = false;
            character.throwFrame = 0;
          }
        }
      } else if (character.isAttacking) {
      // Attack animation
        character.attackTimer++;
        if (character.attackTimer >= ATTACK_FRAME_DURATION) {
          character.attackTimer = 0;
          character.attackFrame++;
          // End attack when all frames have played
          if (character.attackFrame >= attackFrames.length) {
            character.isAttacking = false;
            character.attackFrame = 0;
          }
        }
      } else if (character.isMoving) {
        // Animate walk cycle when moving
        character.animTimer++;
        if (character.animTimer >= ANIM_FRAME_DURATION) {
          character.animTimer = 0;
          character.currentFrame = (character.currentFrame + 1) % walkFrames.length;
        }
      } else {
        // Idle: show first frame, reset timer
        character.currentFrame = 0;
        character.animTimer = 0;
      }

      // Breathing timer always ticks
      character.breathTimer += BREATH_SPEED;

      // Update projectiles
      for (let i = projectiles.length - 1; i >= 0; i--) {
        const p = projectiles[i];
        p.x += HAMMER_SPEED * p.dir;

        // Cycle through rotation angles
        p.rotTimer++;
        if (p.rotTimer >= 4) {
          p.rotTimer = 0;
          p.rotIndex = (p.rotIndex + 1) % HAMMER_ROTATIONS.length;
        }

        // Remove if off screen
        if (p.x < -HAMMER_SIZE || p.x > CANVAS_WIDTH + HAMMER_SIZE) {
          projectiles.splice(i, 1);
        }
      }
    }

    // ========== RENDER ==========

    function render() {
      // Clear canvas
      ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

      // Draw background (stretch to fill canvas)
      if (bgImage.complete && bgImage.naturalWidth > 0) {
        ctx.drawImage(bgImage, 0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
      } else {
        // Fallback gradient
        const grad = ctx.createLinearGradient(0, 0, 0, CANVAS_HEIGHT);
        grad.addColorStop(0, '#4a90d9');
        grad.addColorStop(0.6, '#87CEEB');
        grad.addColorStop(0.6, '#555');
        grad.addColorStop(1, '#333');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
      }

      // Calculate perspective scale based on y position
      const groundY = CANVAS_HEIGHT - CHAR_RENDER_HEIGHT - 20;
      const topY = groundY - 100;
      // scale goes from 1.0 (at ground) to MIN_SCALE (at top)
      const t = (groundY - character.y) / (groundY - topY); // 0 at ground, 1 at top
      const scale = 1 - t * (1 - MIN_SCALE);

      // Apply breathing effect (subtle sine wave scale)
      const breathScale = 1 + Math.sin(character.breathTimer) * BREATH_AMOUNT;

      const drawW = Math.round(CHAR_RENDER_WIDTH * scale * breathScale);
      const drawH = Math.round(CHAR_RENDER_HEIGHT * scale * breathScale);
      // Keep feet anchored: adjust y so bottom edge stays consistent
      const drawX = Math.round(character.x + (CHAR_RENDER_WIDTH - drawW) / 2);
      const drawY = Math.round(character.y + (CHAR_RENDER_HEIGHT - drawH));

      // Pick the right frame: throw > attack > walk > idle
      let frame;
      if (character.isThrowing) {
        frame = throwFrames[character.throwFrame];
      } else if (character.isAttacking) {
        frame = attackFrames[character.attackFrame];
      } else if (character.isMoving) {
        frame = walkFrames[character.currentFrame];
      } else {
        frame = standingImg;
      }

      if (frame && frame.complete && frame.naturalWidth > 0) {
        ctx.save();

        if (!character.facingRight) {
          ctx.translate(drawX + drawW, drawY);
          ctx.scale(-1, 1);
          ctx.drawImage(frame, 0, 0, drawW, drawH);
        } else {
          ctx.drawImage(frame, drawX, drawY, drawW, drawH);
        }

        ctx.restore();
      } else {
        ctx.fillStyle = '#ff69b4';
        ctx.fillRect(drawX, drawY, drawW, drawH);
      }

      // Draw projectiles (thrown hammers)
      if (hammerImg.complete && hammerImg.naturalWidth > 0) {
        for (const p of projectiles) {
          ctx.save();
          const angle = HAMMER_ROTATIONS[p.rotIndex] * Math.PI / 180;
          // Translate to hammer center, rotate, then draw centered
          ctx.translate(p.x, p.y);
          if (p.dir < 0) ctx.scale(-1, 1); // flip for left-facing throws
          ctx.rotate(angle);
          ctx.drawImage(hammerImg, -HAMMER_SIZE / 2, -HAMMER_SIZE / 2, HAMMER_SIZE, HAMMER_SIZE);
          ctx.restore();
        }
      }
    }

    // ========== GAME LOOP ==========

    function gameLoop() {
      update();
      render();
      requestAnimationFrame(gameLoop);
    }

    // Start the game loop
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
